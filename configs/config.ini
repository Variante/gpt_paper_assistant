[SELECTION]
run_llm = true
# Set use_local_llm = true to use a vLLM server instead of OpenAI
use_local_llm = false
local_llm_url = http://192.168.191.34:8000/v1
# Model name served by vLLM (check with: GET /v1/models)
local_llm_model = Qwen/Qwen3.5-9B
# DO NOT USE GPT 3.5 TURBO EXCEPT FOR DEBUGGING
#model = gpt-3.5-turbo
#model = gpt-3.5-turbo-1106
#model = gpt-4
#model = gpt-4-turbo-preview
model = gpt-5-mini
# cost quality tradeoff - larger batches are cheaper but less accurate.
batch_size = 5

[FILTERING]
#arxiv_category = cs.CL,cs.LG,cs.AI
arxiv_category = cs.CV,cs.LG,cs.RO
# force_primary ignores papers that are only cross-listed into the arxiv_category
force_primary = true
relevance_cutoff = 5

[OUTPUT]
debug_messages = true
dump_debug_file = true
output_path = out/
# options: json, md, slack
dump_json = true
dump_md = true
push_to_slack = false
push_to_google = true
